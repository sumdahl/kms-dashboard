{% extends "admin/layout.html" %}

{% block title %}Roles & Permissions{% endblock %}

{% block admin_content %}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- Roles list -->
  <div class="bg-surface-01 border border-border-subtle rounded-card overflow-hidden">
    <div class="flex items-center h-10 px-4 bg-surface-02 border-b border-border-subtle">
      <span class="text-[13px] font-medium text-text-secondary">Roles</span>
    </div>
    <div id="roles-list" hx-get="/admin/roles/list" hx-trigger="load" hx-swap="innerHTML">
      <div class="p-4 text-sm text-text-helper">Loading roles...</div>
    </div>
  </div>

  <!-- Create role form -->
  <div class="bg-surface-01 border border-border-subtle rounded-card overflow-hidden">
    <div class="flex items-center h-10 px-4 bg-surface-02 border-b border-border-subtle">
      <span class="text-[13px] font-medium text-text-secondary">Create Role</span>
    </div>
    <div class="p-4">
      <div id="create-role-error"></div>
      <form id="create-role-form" hx-post="/admin/roles/create" hx-encoding="json" hx-target="#roles-list" hx-swap="innerHTML" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1.5">
          <label for="role-name" class="text-xs font-medium text-text-secondary">Role name</label>
          <input
            id="role-name"
            name="name"
            type="text"
            required
            placeholder="e.g. Editor"
            class="h-9 px-3 rounded-sm border border-border-subtle bg-surface-02 text-sm text-text-primary placeholder:text-text-helper focus:outline-none focus:ring-2 focus:ring-btn-primary focus:border-transparent transition-colors"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="role-desc" class="text-xs font-medium text-text-secondary">Description</label>
          <input
            id="role-desc"
            name="description"
            type="text"
            required
            placeholder="e.g. Can read and write orders"
            class="h-9 px-3 rounded-sm border border-border-subtle bg-surface-02 text-sm text-text-primary placeholder:text-text-helper focus:outline-none focus:ring-2 focus:ring-btn-primary focus:border-transparent transition-colors"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-text-secondary">Permissions</label>
          <div id="permissions-rows" class="flex flex-col gap-2">
            <div class="flex items-center gap-2">
              <select name="resource_0" class="h-9 px-3 flex-1 rounded-sm border border-border-subtle bg-surface-02 text-sm text-text-primary focus:outline-none focus:ring-2 focus:ring-btn-primary">
                <option value="orders">Orders</option>
                <option value="customers">Customers</option>
                <option value="reports">Reports</option>
                <option value="inventory">Inventory</option>
                <option value="admin_panel">Admin Panel</option>
              </select>
              <select name="access_0" class="h-9 px-3 w-28 rounded-sm border border-border-subtle bg-surface-02 text-sm text-text-primary focus:outline-none focus:ring-2 focus:ring-btn-primary">
                <option value="read">Read</option>
                <option value="write">Write</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <button type="button" onclick="addPermissionRow()" class="text-xs text-btn-primary hover:underline self-start mt-1">+ Add permission</button>
        </div>

        <button
          type="submit"
          class="h-9 mt-1 rounded-sm bg-btn-primary text-white text-sm font-medium hover:bg-btn-primary-hover transition-colors disabled:opacity-50"
        >
          Create role
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block body_scripts %}
<script>
  let permCount = 1;
  function addPermissionRow() {
    const container = document.getElementById('permissions-rows');
    const row = document.createElement('div');
    row.className = 'flex items-center gap-2';
    row.innerHTML = `
      <select name="resource_${permCount}" class="h-9 px-3 flex-1 rounded-sm border border-border-subtle bg-surface-02 text-sm text-text-primary focus:outline-none focus:ring-2 focus:ring-btn-primary">
        <option value="orders">Orders</option>
        <option value="customers">Customers</option>
        <option value="reports">Reports</option>
        <option value="inventory">Inventory</option>
        <option value="admin_panel">Admin Panel</option>
      </select>
      <select name="access_${permCount}" class="h-9 px-3 w-28 rounded-sm border border-border-subtle bg-surface-02 text-sm text-text-primary focus:outline-none focus:ring-2 focus:ring-btn-primary">
        <option value="read">Read</option>
        <option value="write">Write</option>
        <option value="admin">Admin</option>
      </select>
      <button type="button" onclick="this.parentElement.remove()" class="w-7 h-7 flex items-center justify-center rounded-sm text-icon-muted hover:text-status-red hover:bg-surface-hover transition-colors text-sm">✕</button>
    `;
    container.appendChild(row);
    permCount++;
  }
</script>
{% endblock %}
