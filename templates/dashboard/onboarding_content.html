{% if !notice.is_empty() %}
<div
    data-app-notification
    data-auto-dismiss="5000"
    class="flex items-center justify-between gap-3 px-4 md:px-8 py-2 border-b border-border-subtle min-h-10 shrink-0"
    style="background: var(--color-banner-success-bg)"
    role="alert"
>
    <div class="flex items-center gap-3 min-w-0 flex-1">
        <span class="shrink-0" style="color: var(--color-status-green)">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path d="M20 6 9 17l-5-5" />
            </svg>
        </span>
        <p
            class="text-xs sm:text-sm font-medium text-text-primary leading-snug flex-1"
        >
            {{ notice }}
        </p>
    </div>
    <button
        type="button"
        class="shrink-0 flex h-8 w-8 items-center justify-center rounded-sm text-banner-text hover:bg-black/5 dark:hover:bg-white/5 transition-colors"
        aria-label="Dismiss"
        onclick="
            const el = this.closest('[data-app-notification]');
            if (el) el.remove();
        "
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
        </svg>
    </button>
</div>
<script>
    history.replaceState(null, "", window.location.pathname);
    setTimeout(function () {
        window.location.href = "/";
    }, 5000);
</script>
{% endif %}
<div class="max-w-300 w-full py-4">
    <div class="mb-8 flex flex-col gap-2">
        <div class="flex items-start gap-3">
            <div class="text-icon-secondary mt-1 shrink-0">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="22"
                    height="22"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <polyline points="16 11 18 13 22 9" />
                </svg>
            </div>
            <div>
                <h1 class="text-[22px] font-bold text-text-primary">
                    Grant User Access
                </h1>
                <p class="text-[13px] text-text-secondary mt-0.5">
                    Assign a system role to a team member. Submits as a normal
                    form — no separate API step.
                </p>
            </div>
        </div>
    </div>
    <div class="flex flex-col lg:flex-row gap-10 items-start">
        <div class="w-full lg:max-w-2xl">
            <div class="bg-surface-01 overflow-hidden">
                {% include "dashboard/assign_form_fragment.html" %}
            </div>
        </div>
    </div>
</div>
