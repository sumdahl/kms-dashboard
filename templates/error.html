<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ code }} {{ title }} — KMS Dashboard</title>
        <script>
            (function () {
                try {
                    const theme = localStorage.getItem("theme");
                    const systemDark = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    ).matches;
                    if (theme === "dark" || (!theme && systemDark)) {
                        document.documentElement.classList.add("dark");
                    }
                } catch (e) {}
            })();
        </script>
        <link rel="stylesheet" href="/static/css/output.css" />
        <script src="/static/js/lucide.umd.js"></script>
        <script src="/static/js/lucide-icons.js"></script>
    </head>
    <body class="flex items-center justify-center min-h-screen bg-bg-page">
        <div class="flex flex-col items-center text-center max-w-md px-6">
            <div
                class="flex items-center justify-center w-16 h-16 rounded-full bg-surface-02 text-icon-muted mb-6"
            >
                {% if code == 404 %}
                <i data-lucide="search-x" class="w-7 h-7 shrink-0"></i>
                {% else %}
                <i data-lucide="shield-alert" class="w-7 h-7 shrink-0"></i>
                {% endif %}
            </div>
            <p class="text-4xl font-bold text-text-primary mb-2">{{ code }}</p>
            <h1 class="text-lg font-semibold text-text-primary mb-2">
                {{ title }}
            </h1>
            <p class="text-[13px] text-text-secondary mb-8">{{ message }}</p>
            <div class="flex items-center gap-3">
                <a
                    href="/"
                    class="inline-flex items-center px-4 h-9 rounded-sm bg-btn-primary text-text-on-primary text-[13px] font-medium hover:bg-btn-primary-hover transition-colors"
                >
                    Go Home
                </a>
                <button
                    onclick="history.back()"
                    class="inline-flex items-center px-4 h-9 rounded-sm border border-border-subtle bg-surface-01 text-[13px] font-medium text-text-secondary hover:bg-surface-hover transition-colors"
                >
                    Go Back
                </button>
            </div>
        </div>
    </body>
</html>
