<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Forgot Password - KMS Dashboard</title>
        <link rel="stylesheet" href="/static/css/output.css" />
        <script src="/static/js/htmx.min.js" defer></script>
        <script
            src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"
            defer
        ></script>
        <script src="/static/js/lucide.umd.js"></script>
        <script src="/static/js/lucide-icons.js"></script>
    </head>
    <body class="bg-bg-page flex items-center justify-center min-h-screen px-4">
        <div class="w-full max-w-md">
            <!-- Brand -->
            <div class="flex items-center justify-center gap-2 mb-6">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                <span
                    class="text-[11px] text-text-helper tracking-widest uppercase font-medium"
                    >KMS Dashboard</span
                >
            </div>

            <div
                class="bg-surface-01 border border-border-subtle rounded-card shadow-sm overflow-hidden"
            >
                <div
                    class="h-px bg-gradient-to-r from-transparent via-indigo-500/40 to-transparent"
                ></div>

                <div class="p-8">
                    <div class="flex flex-col items-center mb-8">
                        <!-- Icon -->
                        <div
                            class="w-11 h-11 bg-surface-02 border border-border-subtle rounded-md flex items-center justify-center mb-5"
                        >
                            <i
                                data-lucide="lock-keyhole"
                                class="w-5 h-5 text-icon-secondary shrink-0"
                            ></i>
                        </div>
                        <h1
                            class="text-xl font-semibold text-text-primary tracking-tight"
                        >
                            Forgot your password?
                        </h1>
                        <p
                            class="text-[13px] text-text-helper mt-1.5 text-center"
                        >
                            Enter your email and we'll send you a reset link
                        </p>

                        <!-- Global message (success or error) -->
                        <p
                            id="global-message"
                            class="hidden text-[11px] text-center rounded-sm px-3 py-2 mt-4 w-full max-w-[300px]"
                        ></p>
                    </div>

                    <!-- Form — hidden after success -->
                    <div id="form-wrapper">
                        <form
                            id="forgot-form"
                            hx-post="/auth/forgot-password"
                            hx-ext="json-enc"
                            hx-swap="none"
                            class="space-y-4"
                        >
                            <div>
                                <label
                                    for="email"
                                    class="block text-[11px] font-medium text-text-secondary mb-1.5 tracking-wider uppercase"
                                >
                                    Email address
                                </label>
                                <input
                                    type="email"
                                    name="email"
                                    id="email"
                                    autocomplete="email"
                                    placeholder="you@example.com"
                                    class="w-full px-3 h-10 bg-surface-02 border border-border-subtle rounded-sm text-sm text-text-primary placeholder:text-text-helper focus:border-border-strong focus:outline-none transition-colors"
                                />
                                <p
                                    id="email-error"
                                    class="hidden mt-1.5 text-[11px] text-red-500 flex items-center gap-1"
                                >
                                    <i
                                        data-lucide="circle-alert"
                                        class="w-[11px] h-[11px] shrink-0"
                                    ></i>
                                    <span id="email-error-text"></span>
                                </p>
                            </div>

                            <button
                                type="submit"
                                id="submit-btn"
                                class="w-full h-9 bg-btn-primary text-white text-[13px] font-medium rounded-sm hover:bg-btn-primary-hover transition-colors mt-1"
                            >
                                Send reset link
                            </button>
                        </form>
                    </div>

                    <!-- Success state — shown after submit -->
                    <div
                        id="success-state"
                        class="hidden flex flex-col items-center gap-3 py-2"
                    >
                        <div
                            class="w-10 h-10 rounded-full bg-green-500/10 border border-green-500/20 flex items-center justify-center"
                        >
                            <i
                                data-lucide="check"
                                class="w-[18px] h-[18px] text-green-500 shrink-0"
                            ></i>
                        </div>
                        <p
                            class="text-[13px] text-text-primary font-medium text-center"
                        >
                            Check your inbox
                        </p>
                        <p class="text-[12px] text-text-helper text-center">
                            If that email is registered, a reset link has been
                            sent. It expires in 15 minutes.
                        </p>
                    </div>

                    <div class="mt-6 text-center">
                        <a
                            href="/login"
                            class="text-[12px] text-text-helper hover:text-text-secondary transition-colors flex items-center justify-center gap-1.5"
                        >
                            <i
                                data-lucide="arrow-left"
                                class="w-3 h-3 shrink-0"
                            ></i>
                            Back to login
                        </a>
                    </div>
                </div>

                <!-- Footer bar -->
                <div
                    class="px-8 py-4 bg-surface-02 border-t border-border-subtle flex items-center justify-center gap-1.5"
                >
                    <i
                        data-lucide="lock"
                        class="w-[11px] h-[11px] text-text-helper shrink-0"
                    ></i>
                    <span class="text-[11px] text-text-helper tracking-wide"
                        >End-to-end encrypted</span
                    >
                </div>
            </div>
        </div>

        <script>
            const emailInput = document.getElementById("email");
            const emailErr = document.getElementById("email-error");
            const emailErrTxt = document.getElementById("email-error-text");
            const globalMsg = document.getElementById("global-message");
            const submitBtn = document.getElementById("submit-btn");
            const formWrapper = document.getElementById("form-wrapper");
            const successState = document.getElementById("success-state");

            const BASE = ["border-border-subtle"];
            const RED = ["border-red-500"];
            const GREEN = ["border-green-500"];

            function setBorder(el, state) {
                el.classList.remove(...BASE, ...RED, ...GREEN);
                if (state === "error") el.classList.add(...RED);
                else if (state === "ok") el.classList.add(...GREEN);
                else el.classList.add(...BASE);
            }
            function showErr(errEl, txtEl, msg) {
                txtEl.textContent = msg;
                errEl.classList.remove("hidden");
            }
            function clearErr(errEl, txtEl) {
                txtEl.textContent = "";
                errEl.classList.add("hidden");
            }
            function checkEmail(val) {
                if (!val) return "Email is required.";
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val))
                    return "Enter a valid email address.";
                return "";
            }

            emailInput.addEventListener("input", () => {
                const val = emailInput.value;
                if (!val) {
                    setBorder(emailInput, "default");
                    clearErr(emailErr, emailErrTxt);
                    return;
                }
                const err = checkEmail(val);
                if (err) {
                    setBorder(emailInput, "error");
                    showErr(emailErr, emailErrTxt, err);
                } else {
                    setBorder(emailInput, "ok");
                    clearErr(emailErr, emailErrTxt);
                }
            });

            emailInput.addEventListener("blur", () => {
                if (!emailInput.value) return;
                const err = checkEmail(emailInput.value);
                if (err) {
                    setBorder(emailInput, "error");
                    showErr(emailErr, emailErrTxt, err);
                } else {
                    setBorder(emailInput, "ok");
                    clearErr(emailErr, emailErrTxt);
                }
            });

            document
                .getElementById("forgot-form")
                .addEventListener("htmx:beforeRequest", (evt) => {
                    globalMsg.classList.add("hidden");
                    const err = checkEmail(emailInput.value);
                    if (err) {
                        setBorder(emailInput, "error");
                        showErr(emailErr, emailErrTxt, err);
                        evt.preventDefault();
                        return;
                    }
                    submitBtn.disabled = true;
                    submitBtn.textContent = "Sending…";
                });

            document.body.addEventListener("htmx:afterRequest", (evt) => {
                if (evt.detail.elt.id !== "forgot-form") return;
                submitBtn.disabled = false;
                submitBtn.textContent = "Send reset link";
                const xhr = evt.detail.xhr;

                if (xhr.status >= 200 && xhr.status < 300) {
                    // Hide form, show success state
                    formWrapper.classList.add("hidden");
                    successState.classList.remove("hidden");
                    return;
                }

                // Show error
                try {
                    const res = JSON.parse(xhr.responseText);
                    globalMsg.textContent =
                        res.error || "Something went wrong. Please try again.";
                } catch {
                    globalMsg.textContent =
                        "Something went wrong. Please try again.";
                }
                globalMsg.className =
                    "text-[11px] text-center rounded-sm px-3 py-2 mt-4 w-full max-w-[300px] text-red-500 bg-red-500/5 border border-red-500/20";
                globalMsg.classList.remove("hidden");
            });
        </script>
    </body>
</html>
