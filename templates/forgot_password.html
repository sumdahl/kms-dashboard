<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Forgot Password - KMS Dashboard</title>
        <link rel="stylesheet" href="/static/css/output.css" />
        <script src="/static/js/htmx.min.js" defer></script>
        <script
            src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"
            defer
        ></script>
        <script src="/static/js/lucide.umd.js"></script>
        <script src="/static/js/lucide-icons.js"></script>
    </head>
    <body class="bg-bg-page flex items-center justify-center min-h-screen px-4">
        <div class="w-full max-w-md">
            <!-- Brand -->
            <div
                class="flex items-center justify-center gap-2 mb-6"
                aria-hidden="true"
            >
                <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                <span
                    class="text-[11px] text-text-helper tracking-widest uppercase font-medium"
                    >KMS Dashboard</span
                >
            </div>

            <div
                class="bg-surface-01 border border-border-subtle rounded-card shadow-sm overflow-hidden"
            >
                <div
                    class="h-px bg-gradient-to-r from-transparent via-indigo-500/40 to-transparent"
                ></div>

                <div class="p-8">
                    <!-- Header -->
                    <div class="flex flex-col items-center mb-8">
                        <div
                            class="w-11 h-11 bg-surface-02 border border-border-subtle rounded-md flex items-center justify-center mb-5"
                            aria-hidden="true"
                        >
                            <i
                                data-lucide="lock-keyhole"
                                class="w-5 h-5 text-icon-secondary shrink-0"
                            ></i>
                        </div>
                        <h1
                            class="text-xl font-semibold text-text-primary tracking-tight"
                        >
                            Forgot your password?
                        </h1>
                        <p
                            class="text-[13px] text-text-helper mt-1.5 text-center"
                        >
                            Enter your email and we'll send you a reset link
                        </p>

                        <!-- Global error -->
                        <div
                            id="global-error"
                            role="alert"
                            aria-live="assertive"
                            aria-atomic="true"
                            class="hidden w-full max-w-[300px] mt-4"
                        >
                            <p
                                class="text-[11px] text-red-500 text-center bg-red-500/5 border border-red-500/20 rounded-sm px-3 py-2"
                            ></p>
                        </div>
                    </div>

                    <!-- Form -->
                    <div id="form-wrapper">
                        <form
                            id="forgot-form"
                            hx-post="/auth/forgot-password"
                            hx-ext="json-enc"
                            hx-swap="none"
                            novalidate
                            aria-label="Forgot password form"
                            class="space-y-4"
                        >
                            <div class="space-y-1.5">
                                <label
                                    for="email"
                                    class="block text-[11px] font-medium text-text-secondary tracking-wider uppercase"
                                >
                                    Email address
                                    <span
                                        class="text-red-500 ml-0.5"
                                        aria-hidden="true"
                                        >*</span
                                    >
                                </label>
                                <div class="relative">
                                    <input
                                        type="email"
                                        name="email"
                                        id="email"
                                        autocomplete="email"
                                        placeholder="you@example.com"
                                        aria-required="true"
                                        aria-describedby="email-error"
                                        aria-invalid="false"
                                        class="w-full px-3 h-10 bg-surface-02 border border-border-subtle rounded-sm text-sm text-text-primary placeholder:text-text-helper focus:border-border-strong focus:outline-none transition-colors duration-150"
                                    />
                                    <span
                                        id="email-status-icon"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 hidden"
                                        aria-hidden="true"
                                    ></span>
                                </div>
                                <p
                                    id="email-error"
                                    role="alert"
                                    aria-live="polite"
                                    class="hidden text-[11px] text-red-500 flex items-center gap-1 mt-1"
                                >
                                    <i
                                        data-lucide="circle-alert"
                                        class="w-[11px] h-[11px] shrink-0"
                                    ></i>
                                    <span id="email-error-text"></span>
                                </p>
                            </div>

                            <button
                                type="submit"
                                id="submit-btn"
                                disabled
                                aria-disabled="true"
                                class="w-full h-9 bg-btn-primary text-white text-[13px] font-medium rounded-sm transition-all duration-150 mt-1 opacity-40 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-btn-primary"
                            >
                                Send reset link
                            </button>
                        </form>
                    </div>

                    <!-- Success state -->
                    <div
                        id="success-state"
                        class="hidden flex flex-col items-center gap-3 py-2"
                        role="status"
                        aria-live="polite"
                        aria-atomic="true"
                    >
                        <div
                            class="w-10 h-10 rounded-full bg-green-500/10 border border-green-500/20 flex items-center justify-center"
                        >
                            <i
                                data-lucide="check"
                                class="w-[18px] h-[18px] text-green-500 shrink-0"
                            ></i>
                        </div>
                        <p
                            class="text-[13px] text-text-primary font-medium text-center"
                        >
                            Check your inbox
                        </p>
                        <p class="text-[12px] text-text-helper text-center">
                            If that email is registered, a reset link has been
                            sent. It expires in 15 minutes.
                        </p>
                    </div>

                    <div class="mt-6 text-center">
                        <a
                            href="/login"
                            class="text-[12px] text-text-helper hover:text-text-secondary transition-colors flex items-center justify-center gap-1.5 focus:outline-none focus:underline"
                        >
                            <i
                                data-lucide="arrow-left"
                                class="w-3 h-3 shrink-0"
                            ></i>
                            Back to login
                        </a>
                    </div>
                </div>

                <!-- Footer -->
                <div
                    class="px-8 py-4 bg-surface-02 border-t border-border-subtle flex items-center justify-center gap-1.5"
                >
                    <i
                        data-lucide="lock"
                        class="w-[11px] h-[11px] text-text-helper shrink-0"
                    ></i>
                    <span class="text-[11px] text-text-helper tracking-wide"
                        >End-to-end encrypted</span
                    >
                </div>
            </div>
        </div>

        <script>
            (function () {
                // ── Element refs ──────────────────────────────────────────────
                const form = document.getElementById("forgot-form");
                const emailInput = document.getElementById("email");
                const emailErr = document.getElementById("email-error");
                const emailErrTxt = document.getElementById("email-error-text");
                const emailIcon = document.getElementById("email-status-icon");
                const globalErrEl = document.getElementById("global-error");
                const globalErrP = globalErrEl.querySelector("p");
                const submitBtn = document.getElementById("submit-btn");
                const formWrapper = document.getElementById("form-wrapper");
                const successState = document.getElementById("success-state");

                // ── State ─────────────────────────────────────────────────────
                let isSubmitting = false;
                let emailDirty = false;

                // ── Validation ────────────────────────────────────────────────
                const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                function validateEmail(val) {
                    if (!val) return "Email is required.";
                    if (!val.includes("@")) return "Email must contain @.";
                    if (!EMAIL_RE.test(val))
                        return "Enter a valid email address.";
                    return "";
                }

                // ── Border helpers ────────────────────────────────────────────
                const BORDER = {
                    default: ["border-border-subtle"],
                    error: ["border-red-500"],
                    ok: ["border-green-500"],
                };

                function setBorder(el, state) {
                    Object.values(BORDER).forEach((cls) =>
                        el.classList.remove(...cls),
                    );
                    el.classList.add(...BORDER[state]);
                }

                // ── Field error display ───────────────────────────────────────
                function showFieldError(msg) {
                    emailErrTxt.textContent = msg;
                    emailErr.classList.remove("hidden");
                    emailInput.setAttribute("aria-invalid", "true");
                    setBorder(emailInput, "error");
                }

                function clearFieldError() {
                    emailErrTxt.textContent = "";
                    emailErr.classList.add("hidden");
                    emailInput.setAttribute("aria-invalid", "false");
                }

                // ── Status icon ───────────────────────────────────────────────
                function setEmailIcon(ok) {
                    if (ok) {
                        emailIcon.innerHTML = `<i data-lucide="circle-check" class="w-3.5 h-3.5 text-green-500 shrink-0"></i>`;
                        emailIcon.classList.remove("hidden");
                        if (window.lucide) window.lucide.createIcons();
                    } else {
                        emailIcon.classList.add("hidden");
                        emailIcon.innerHTML = "";
                    }
                }

                // ── Global error ──────────────────────────────────────────────
                function showGlobalError(msg) {
                    globalErrP.textContent = msg;
                    globalErrEl.classList.remove("hidden");
                    globalErrEl.scrollIntoView({
                        behavior: "smooth",
                        block: "nearest",
                    });
                }

                function clearGlobalError() {
                    globalErrEl.classList.add("hidden");
                    globalErrP.textContent = "";
                }

                // ── Submit button state ───────────────────────────────────────
                function updateSubmitState() {
                    const canSubmit =
                        validateEmail(emailInput.value) === "" && !isSubmitting;
                    submitBtn.disabled = !canSubmit;
                    submitBtn.setAttribute("aria-disabled", String(!canSubmit));

                    if (canSubmit) {
                        submitBtn.classList.remove(
                            "opacity-40",
                            "cursor-not-allowed",
                        );
                        submitBtn.classList.add(
                            "hover:bg-btn-primary-hover",
                            "cursor-pointer",
                        );
                    } else {
                        submitBtn.classList.add(
                            "opacity-40",
                            "cursor-not-allowed",
                        );
                        submitBtn.classList.remove(
                            "hover:bg-btn-primary-hover",
                            "cursor-pointer",
                        );
                    }
                }

                // ── Loading state ─────────────────────────────────────────────
                function setLoading(loading) {
                    isSubmitting = loading;
                    submitBtn.disabled = loading;
                    submitBtn.setAttribute("aria-disabled", String(loading));

                    if (loading) {
                        submitBtn.innerHTML = `
                        <span class="flex items-center justify-center gap-2">
                            <svg class="animate-spin w-3.5 h-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            Sending…
                        </span>`;
                        submitBtn.classList.add(
                            "opacity-70",
                            "cursor-not-allowed",
                        );
                        submitBtn.classList.remove(
                            "hover:bg-btn-primary-hover",
                        );
                    } else {
                        submitBtn.textContent = "Send reset link";
                        submitBtn.classList.remove(
                            "opacity-70",
                            "cursor-not-allowed",
                        );
                        updateSubmitState();
                    }
                }

                // ── Email validation handler ──────────────────────────────────
                function handleEmailValidation() {
                    const val = emailInput.value;
                    const err = validateEmail(val);

                    if (!val) {
                        setBorder(emailInput, "default");
                        clearFieldError();
                        setEmailIcon(false);
                    } else if (err) {
                        showFieldError(err);
                        setEmailIcon(false);
                    } else {
                        clearFieldError();
                        setBorder(emailInput, "ok");
                        setEmailIcon(true);
                    }
                    updateSubmitState();
                }

                // ── Event listeners ───────────────────────────────────────────
                emailInput.addEventListener("input", () => {
                    emailDirty = true;
                    handleEmailValidation();
                    clearGlobalError();
                });

                emailInput.addEventListener("blur", () => {
                    if (emailDirty) handleEmailValidation();
                });

                // ── HTMX: block if invalid, set loading ───────────────────────
                form.addEventListener("htmx:beforeRequest", (evt) => {
                    clearGlobalError();

                    const err = validateEmail(emailInput.value);
                    if (err) {
                        showFieldError(err);
                        evt.preventDefault();
                        return;
                    }

                    if (isSubmitting) {
                        evt.preventDefault();
                        return;
                    }

                    setLoading(true);
                });

                // ── HTMX: handle response ─────────────────────────────────────
                document.body.addEventListener("htmx:afterRequest", (evt) => {
                    if (evt.detail.elt.id !== "forgot-form") return;

                    setLoading(false);
                    const xhr = evt.detail.xhr;

                    if (xhr.status >= 200 && xhr.status < 300) {
                        formWrapper.classList.add("hidden");
                        successState.classList.remove("hidden");
                        if (window.lucide) window.lucide.createIcons();
                        return;
                    }

                    let msg = "Something went wrong. Please try again.";
                    try {
                        const res = JSON.parse(xhr.responseText);
                        msg =
                            res.error ||
                            res.message ||
                            res.detail ||
                            (xhr.status === 429
                                ? "Too many attempts. Try again later."
                                : xhr.status === 0
                                  ? "Connection error. Check your network."
                                  : msg);
                    } catch {
                        if (xhr.status === 0)
                            msg = "Connection error. Check your network.";
                    }

                    showGlobalError(msg);

                    const card = form.closest(".bg-surface-01");
                    if (card) {
                        card.classList.add("animate-shake");
                        setTimeout(
                            () => card.classList.remove("animate-shake"),
                            500,
                        );
                    }
                });

                // ── Init ──────────────────────────────────────────────────────
                updateSubmitState();
            })();
        </script>

        <style>
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                15% {
                    transform: translateX(-5px);
                }
                30% {
                    transform: translateX(5px);
                }
                45% {
                    transform: translateX(-4px);
                }
                60% {
                    transform: translateX(4px);
                }
                75% {
                    transform: translateX(-2px);
                }
                90% {
                    transform: translateX(2px);
                }
            }
            .animate-shake {
                animation: shake 0.45s ease-in-out;
            }
        </style>
    </body>
</html>
