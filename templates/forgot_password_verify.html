<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="/static/js/theme-boot.js"></script>
        <title>Check your email - KMS Dashboard</title>
        <link rel="stylesheet" href="/static/css/output.css" />
    </head>
    <body class="bg-bg-page flex items-center justify-center min-h-screen px-4">
        <div class="w-full max-w-md">
            <div class="flex items-center justify-center gap-2 mb-6">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                <span class="text-[11px] text-text-helper tracking-widest uppercase font-medium">KMS Dashboard</span>
            </div>

            <div class="bg-surface-01 border border-border-subtle rounded-card shadow-sm overflow-hidden">
                <div class="h-px bg-linear-to-r from-transparent via-indigo-500/40 to-transparent"></div>

                <div class="p-8">
                    <div class="flex flex-col items-center mb-6">
                        <div class="w-11 h-11 bg-surface-02 border border-border-subtle rounded-md flex items-center justify-center mb-5">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-icon-secondary">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                        </div>
                        <h1 class="text-xl font-semibold text-text-primary tracking-tight text-center">
                            Next step
                        </h1>
                        <p class="text-[13px] text-text-helper mt-1.5 text-center">
                            Password reset request received
                        </p>
                    </div>

                    <div
                        class="mb-6 rounded-sm border-l-[3px] border-l-status-green bg-banner-success-bg px-3 py-2.5"
                        role="status"
                    >
                        <p class="text-[12px] font-medium text-text-primary leading-relaxed">
                            If that email is registered, you'll receive a reset link shortly. The link expires in 15 minutes.
                        </p>
                    </div>

                    <div class="flex flex-col gap-3">
                        <a
                            href="/login"
                            class="w-full h-9 bg-btn-primary text-white text-[13px] font-medium rounded-sm hover:bg-btn-primary-hover transition-colors flex items-center justify-center"
                        >
                            Back to login
                        </a>
                        <a
                            href="/forgot-password"
                            class="w-full h-9 border border-border-subtle bg-surface-02 text-[13px] font-medium text-text-primary rounded-sm hover:border-border-strong transition-colors flex items-center justify-center"
                        >
                            Use a different email
                        </a>
                    </div>
                </div>

                <div class="px-8 py-4 bg-surface-02 border-t border-border-subtle flex items-center justify-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-text-helper">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span class="text-[11px] text-text-helper tracking-wide">End-to-end encrypted</span>
                </div>
            </div>
        </div>
    </body>
</html>
