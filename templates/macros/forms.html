{% macro input_field(label, name, input_type, value, error, variant) %}
<div class="space-y-1.5">
    {% if !label.is_empty() %}
    <label for="{{ name }}" class="block text-[11px] font-medium text-text-secondary tracking-wider uppercase">
        {{ label }}
    </label>
    {% endif %}
    <div class="relative">
        <input
            type="{{ input_type }}"
            name="{{ name }}"
            id="{{ name }}"
            value="{{ value }}"
            {% if input_type == "email" %}autocomplete="email"{% endif %}
            {% if input_type == "password" %}autocomplete="current-password"{% endif %}
            class="w-full px-3 h-10 bg-surface-02 border {% if error.is_some() %}border-red-500{% else %}border-border-subtle{% endif %} rounded-sm text-sm text-text-primary placeholder:text-text-helper focus:border-border-strong focus:outline-none transition-colors {{ variant }}"
        />
    </div>
    {% if let Some(err) = error %}
    <p class="mt-1 text-[11px] text-red-500 flex items-center gap-1">
        <i data-lucide="alert-circle" class="w-3 h-3"></i>
        <span>{{ err }}</span>
    </p>
    {% endif %}
</div>
{% endmacro %}
