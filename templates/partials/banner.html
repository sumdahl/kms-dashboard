<div id="banner-area" style="display:none" aria-live="polite" aria-atomic="false"></div>
<script>
(function () {
    var _seq = 0;

    var _cfg = {
        success: {
            accent: "var(--color-status-green)",
            bg:     "var(--color-banner-success-bg)",
            icon:   '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
        },
        error: {
            accent: "var(--color-status-red)",
            bg:     "var(--color-banner-danger-bg)",
            icon:   '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
        },
        info: {
            accent: "var(--color-status-blue)",
            bg:     "var(--color-banner-bg)",
            icon:   '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',
        },
    };

    // showBanner(message, type)
    // type: "success" | "error" | "info"  (default: "info")
    window.showBanner = function (msg, type) {
        type = _cfg[type] ? type : "info";
        var c = _cfg[type];
        var id = "bn-" + (++_seq);
        var area = document.getElementById("banner-area");
        if (!area) return;

        var el = document.createElement("div");
        el.id = id;
        el.setAttribute("role", "alert");
        el.style.cssText =
            "display:flex;align-items:center;justify-content:space-between;gap:12px;" +
            "padding:0 16px;min-height:40px;" +
            "border-bottom:1px solid rgba(0,0,0,0.06);" +
            "border-left:3px solid " + c.accent + ";" +
            "background:" + c.bg + ";";

        var inner = document.createElement("div");
        inner.style.cssText = "display:flex;align-items:center;gap:10px;flex:1;min-width:0";

        var iconWrap = document.createElement("span");
        iconWrap.style.cssText = "flex-shrink:0;color:" + c.accent;
        iconWrap.innerHTML = c.icon;

        var textEl = document.createElement("p");
        textEl.style.cssText =
            "font-size:13px;font-weight:500;" +
            "color:var(--color-text-primary);" +
            "overflow-wrap:break-word;word-break:break-word;flex:1;padding:8px 0;";
        textEl.textContent = msg;

        var btn = document.createElement("button");
        btn.type = "button";
        btn.setAttribute("aria-label", "Dismiss");
        btn.style.cssText =
            "flex-shrink:0;display:flex;align-items:center;justify-content:center;" +
            "width:28px;height:28px;border-radius:4px;border:none;background:transparent;" +
            "cursor:pointer;color:var(--color-icon-muted);";
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';
        btn.onmouseenter = function () { this.style.background = "rgba(0,0,0,0.06)"; };
        btn.onmouseleave = function () { this.style.background = "transparent"; };
        btn.onclick = function () { window.dismissBanner(id); };

        inner.appendChild(iconWrap);
        inner.appendChild(textEl);
        el.appendChild(inner);
        el.appendChild(btn);
        area.appendChild(el);
        area.style.display = "block";

        setTimeout(function () { window.dismissBanner(id); }, 3000);

        return id;
    };

    window.dismissBanner = function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.remove();
        var area = document.getElementById("banner-area");
        if (area && area.children.length === 0) area.style.display = "none";
    };

    window.clearBanners = function () {
        var area = document.getElementById("banner-area");
        if (area) { area.innerHTML = ""; area.style.display = "none"; }
    };
})();
</script>
