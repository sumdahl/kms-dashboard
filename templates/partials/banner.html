<div
    id="announcement-banner"
    class="relative flex flex-row items-center justify-between gap-4 px-4 py-2 bg-banner-bg border-b border-banner-border sm:px-12 sm:py-0 sm:h-10 shrink-0"
    role="alert"
>
    <!-- Content Area: Wraps on small screens, stays row on larger -->
    <div class="flex-1 flex flex-row items-center justify-center sm:justify-start gap-3 min-w-0">
        <!-- Notification Icon -->
        <span class="shrink-0 text-banner-text hidden sm:flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
        </span>

        <p class="text-xs sm:text-sm text-banner-text text-center sm:text-left font-medium leading-tight truncate">
            Dynamically optimize, clip, and resize video from any origin with Media Transformations.
        </p>
        
        <a
            href="#"
            class="shrink-0 inline-flex items-center justify-center px-2.5 py-0.5 text-2xs sm:text-xs font-semibold border border-banner-text rounded-sm text-banner-text bg-transparent hover:bg-banner-text hover:text-white dark:hover:text-banner-bg transition-colors whitespace-nowrap ml-1"
        >
            Enable Now
        </a>
    </div>

    <!-- Dismiss Button -->
    <button
        type="button"
        aria-label="Dismiss"
        class="shrink-0 flex items-center justify-center w-8 h-8 rounded-sm text-banner-text hover:bg-black/5 dark:hover:bg-white/5 transition-colors"
        hx-delete="/ui/banner"
        hx-target="#announcement-banner"
        hx-swap="outerHTML"
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
        </svg>
    </button>
</div>
