<div
    id="announcement-banner"
    class="relative flex items-center gap-3 pl-4 pr-3 h-10 shrink-0 border-b border-border-subtle bg-blue-50/60 dark:bg-blue-950/10 overflow-hidden"
    style="border-left: 3px solid var(--color-status-blue);"
    role="banner"
    aria-label="Site announcement"
>
    <!-- Icon -->
    <span class="shrink-0" style="color: var(--color-status-blue)">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"COSMIC desktop environment
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4" />
            <path d="M12 8h.01" />
        </svg>
    </span>

    <!-- Message -->
    <p class="flex-1 min-w-0 text-[13px] font-medium text-text-primary truncate">
        Dynamically optimize, clip, and resize video from any origin with Media Transformations.
    </p>

    <!-- CTA -->
    <a
        href="#"
        class="shrink-0 text-[12px] font-semibold whitespace-nowrap underline-offset-2 hover:underline"
        style="color: var(--color-status-blue)"
    >
        Enable Now
    </a>

    <!-- Separator -->
    <span class="shrink-0 w-px h-4 bg-border-subtle" aria-hidden="true"></span>

    <!-- Dismiss -->
    <button
        type="button"
        aria-label="Dismiss announcement"
        class="shrink-0 flex items-center justify-center w-7 h-7 rounded-sm text-icon-muted hover:text-text-primary hover:bg-surface-active transition-colors"
        hx-delete="/ui/banner"
        hx-target="#announcement-banner"
        hx-swap="outerHTML"
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
        </svg>
    </button>
</div>
