<header
  class="h-12 min-h-12 bg-surface-01 border-b border-border-subtle flex items-center justify-end px-4 gap-2 sticky top-0 z-40"
>
  <div class="flex items-center gap-2">
    <!-- Ask AI -->
    <button
      class="flex items-center gap-1 px-3 h-8 rounded-sm text-base text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors border-none bg-transparent font-[inherit]"
      type="button"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="text-icon-muted"
      >
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        <path d="M20 3v4" />
        <path d="M22 5h-4" />
      </svg>
      <span class="text-[13px]">Ask AI</span>
    </button>

    <!-- Support -->
    <button
      class="flex items-center gap-1 px-3 h-8 rounded-sm text-base text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors border-none bg-transparent font-[inherit]"
      type="button"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="text-icon-muted"
      >
        <circle cx="12" cy="12" r="10" />
        <circle cx="12" cy="12" r="4" />
        <line x1="4.93" x2="9.17" y1="4.93" y2="9.17" />
        <line x1="14.83" x2="19.07" y1="14.83" y2="19.07" />
        <line x1="14.83" x2="19.07" y1="9.17" y2="4.93" />
        <line x1="4.93" x2="9.17" y1="19.07" y2="14.83" />
      </svg>
      <span class="text-[13px]">Support</span>
    </button>

    <!-- Avatar -->
    <div
      class="w-7 h-7 rounded-full bg-surface-active border border-border-subtle flex items-center justify-center text-[11px] font-semibold text-text-secondary cursor-pointer select-none"
      role="button"
      tabindex="0"
      aria-label="Account menu"
    >
      {{ user_email|truncate(1) }}
    </div>
  </div>
</header>
