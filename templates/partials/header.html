<header
    class="h-12 min-h-12 bg-surface-01 border-b border-border-subtle flex items-center justify-end px-4 gap-2 sticky top-0 z-40"
>
    <div class="flex items-center gap-2">
        <!-- Ask AI -->
        <button
            class="flex items-center gap-1 px-3 h-8 rounded-sm text-base text-text-primary hover:bg-surface-hover transition-colors border-none bg-transparent font-[inherit]"
            type="button"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-icon-muted"
            >
                <path
                    d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"
                />
                <path d="M5 3v4" />
                <path d="M19 17v4" />
                <path d="M3 5h4" />
                <path d="M17 19h4" />
            </svg>
            <span class="text-[13px]">Ask AI</span>
        </button>

        <!-- Support -->
        <button
            class="flex items-center gap-1 px-3 h-8 rounded-sm text-base text-text-primary hover:bg-surface-hover transition-colors border-none bg-transparent font-[inherit]"
            type="button"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-icon-muted"
            >
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="4" />
                <line x1="4.93" x2="9.17" y1="4.93" y2="9.17" />
                <line x1="14.83" x2="19.07" y1="14.83" y2="19.07" />
                <line x1="14.83" x2="19.07" y1="9.17" y2="4.93" />
                <line x1="4.93" x2="9.17" y1="19.07" y2="14.83" />
            </svg>
            <span class="text-[13px]">Support</span>
        </button>

        <!-- Avatar + Dropdown -->
        <div class="relative" id="account-menu-wrapper">
            <!-- Avatar -->
            <div
                id="account-avatar"
                class="w-7 h-7 rounded-full bg-surface-active border border-border-subtle flex items-center justify-center text-[11px] font-semibold text-text-secondary cursor-pointer select-none"
                role="button"
                tabindex="0"
                aria-label="Account menu"
                aria-expanded="false"
                aria-haspopup="true"
            >
                {{ user_email|truncate(1) }}
            </div>

            <!-- Dropdown (hidden by default, populated by HTMX) -->
            <div
                id="account-dropdown"
                class="hidden absolute right-0 top-9 z-50"
            ></div>
        </div>
    </div>
</header>

<script>
    (function () {
        const wrapper = document.getElementById("account-menu-wrapper");
        const avatar = document.getElementById("account-avatar");
        const dropdown = document.getElementById("account-dropdown");

        function openMenu() {
            // Only fetch if the dropdown is currently empty
            if (!dropdown.innerHTML.trim()) {
                htmx.ajax("GET", "/account-menu", {
                    target: "#account-dropdown",
                    swap: "innerHTML",
                });
            }
            dropdown.classList.remove("hidden");
            avatar.setAttribute("aria-expanded", "true");
        }

        function closeMenu() {
            dropdown.classList.add("hidden");
            avatar.setAttribute("aria-expanded", "false");
        }

        function isOpen() {
            return !dropdown.classList.contains("hidden");
        }

        // Toggle on avatar click
        avatar.addEventListener("click", (e) => {
            e.stopPropagation();
            isOpen() ? closeMenu() : openMenu();
        });

        // Keyboard: Enter / Space to toggle, Escape to close
        avatar.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                isOpen() ? closeMenu() : openMenu();
            }
            if (e.key === "Escape") closeMenu();
        });

        // Close on outside click (anywhere not inside the wrapper)
        document.addEventListener("click", (e) => {
            if (!wrapper.contains(e.target)) closeMenu();
        });

        // Close on Escape from anywhere on the page
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeMenu();
        });

        dropdown.addEventListener("click", (e) => {
            if (e.target.closest('[role="menuitem"]')) closeMenu();
        });
    })();
</script>
