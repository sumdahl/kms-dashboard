<header
    class="h-12 min-h-12 bg-surface-01 border-b border-border-subtle flex items-center justify-between px-4 gap-2 sticky top-0 z-40"
>
    <!-- Mobile Sidebar Toggle -->
    <div class="flex items-center md:hidden">
        <button
            id="mobile-sidebar-toggle"
            class="flex items-center justify-center w-8 h-8 rounded-sm text-icon-muted hover:text-icon-secondary hover:bg-surface-active transition-colors border-none bg-transparent"
            title="Menu"
            aria-label="Menu"
        >
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Header Actions (Right aligned) -->
    <div class="flex items-center gap-2 ml-auto">
        <!-- Ask AI -->
        <button
            class="flex items-center gap-1 px-3 h-8 rounded-sm text-base text-text-primary hover:bg-surface-hover transition-colors border-none bg-transparent font-[inherit]"
            type="button"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-icon-muted"
            >
                <path
                    d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"
                />
                <path d="M5 3v4" />
                <path d="M19 17v4" />
                <path d="M3 5h4" />
                <path d="M17 19h4" />
            </svg>
            <span class="text-[13px]">Ask AI</span>
        </button>

        <!-- Support -->
        <button
            class="flex items-center gap-1 px-3 h-8 rounded-sm text-base text-text-primary hover:bg-surface-hover transition-colors border-none bg-transparent font-[inherit]"
            type="button"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-icon-muted"
            >
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="4" />
                <line x1="4.93" x2="9.17" y1="4.93" y2="9.17" />
                <line x1="14.83" x2="19.07" y1="14.83" y2="19.07" />
                <line x1="14.83" x2="19.07" y1="9.17" y2="4.93" />
                <line x1="4.93" x2="9.17" y1="19.07" y2="14.83" />
            </svg>
            <span class="text-[13px]">Support</span>
        </button>

        <!-- Account menu: fixed panel so main column does not steal clicks -->
        <details class="relative group z-50" id="account-menu-wrapper">
            <summary
                id="account-avatar"
                class="w-7 h-7 rounded-full bg-surface-active border border-border-subtle flex items-center justify-center text-[11px] font-semibold text-text-secondary cursor-pointer select-none list-none marker:content-none [&::-webkit-details-marker]:hidden"
                aria-label="Account menu"
                aria-haspopup="menu"
            >
                {{ user_email|truncate(1) }}
            </summary>
            <div class="fixed right-4 top-12 z-[100] pt-0.5 pointer-events-auto min-w-56">
                {% include "partials/account_menu.html" %}
            </div>
        </details>
    </div>
</header>
