<div
    id="search-modal"
    class="fixed inset-0 z-[100] hidden overflow-y-auto"
    role="dialog"
    aria-modal="true"
>
    <!-- Backdrop -->
    <div
        class="fixed inset-0 bg-zinc-900/40 transition-opacity"
        onclick="closeSearch()"
    ></div>

    <!-- Modal Content -->
    <div
        class="relative z-10 flex min-h-full items-start justify-center p-4 sm:p-6 md:p-20"
    >
        <div
            class="w-full max-w-2xl overflow-hidden rounded-lg bg-surface-01 shadow-2xl ring-1 ring-border-subtle transition-all"
        >
            <!-- Search Header -->
            <div
                class="relative flex items-center border-b border-border-subtle bg-surface-01"
            >
                <div
                    class="pointer-events-none pl-4 pr-3 flex items-center justify-center"
                >
                    <i
                        data-lucide="search"
                        class="w-[18px] h-[18px] text-icon-secondary shrink-0"
                    ></i>
                </div>
                <input
                    type="text"
                    id="search-input"
                    class="h-12 w-full border-0 bg-transparent py-3 pr-12 text-[14px] text-text-primary placeholder:text-text-placeholder focus:ring-0 outline-none"
                    placeholder="Search products, pages, and features..."
                    name="q"
                    hx-get="/api/search"
                    hx-trigger="keyup[target.value.length >= 3] changed delay:300ms"
                    hx-target="#search-results"
                    hx-indicator="#search-spinner"
                    autocomplete="off"
                />
                <div class="absolute right-4 flex items-center gap-2">
                    <div id="search-spinner" class="htmx-indicator">
                        <div
                            class="animate-spin h-4 w-4 border-2 border-indigo-500 border-t-transparent rounded-full"
                        ></div>
                    </div>
                    <kbd
                        class="hidden sm:block rounded border border-border-strong px-1.5 py-0.5 bg-surface-02 text-[10px] text-text-helper font-sans shadow-sm"
                        >Esc</kbd
                    >
                </div>
            </div>

            <!-- Results area -->
            <div
                id="search-results"
                class="max-h-[60vh] overflow-y-auto bg-surface-01"
            >
                <!-- Initial State: Search Tips -->
                <div class="p-4">
                    <h2
                        class="text-[11px] font-bold text-text-secondary mb-3 px-2"
                    >
                        Search tips
                    </h2>
                    <div class="flex flex-col gap-1">
                        <div
                            class="flex items-center gap-3 px-3 py-2 rounded-md text-[13px] text-text-secondary hover:bg-surface-02 group cursor-default transition-colors"
                        >
                            <i
                                data-lucide="sparkles"
                                class="w-4 h-4 text-icon-muted"
                            ></i>
                            <div class="flex-1">
                                <span class="font-bold text-text-primary"
                                    >ask:</span
                                >
                                <span class="text-text-helper mx-1">—</span>
                                <span>Ask AI</span>
                            </div>
                        </div>
                        <div
                            class="flex items-center gap-3 px-3 py-2 rounded-md text-[13px] text-text-secondary hover:bg-surface-02 group cursor-default transition-colors"
                        >
                            <i
                                data-lucide="shield-check"
                                class="w-4 h-4 text-icon-muted"
                            ></i>
                            <div class="flex-1">
                                <span class="font-bold text-text-primary"
                                    >access:</span
                                >
                                <span class="text-text-helper mx-1">—</span>
                                <span>Search Access applications</span>
                            </div>
                        </div>
                        <div
                            class="flex items-center gap-3 px-3 py-2 rounded-md text-[13px] text-text-secondary hover:bg-surface-02 group cursor-default transition-colors"
                        >
                            <i
                                data-lucide="network"
                                class="w-4 h-4 text-icon-muted"
                            ></i>
                            <div class="flex-1">
                                <span class="font-bold text-text-primary"
                                    >aig:</span
                                >
                                <span class="text-text-helper mx-1">—</span>
                                <span>Search AI Gateways</span>
                            </div>
                        </div>
                        <div
                            class="flex items-center gap-3 px-3 py-2 rounded-md text-[13px] text-text-secondary hover:bg-surface-02 group cursor-default transition-colors"
                        >
                            <i
                                data-lucide="search-code"
                                class="w-4 h-4 text-icon-muted"
                            ></i>
                            <div class="flex-1">
                                <span class="font-bold text-text-primary"
                                    >ais:</span
                                >
                                <span class="text-text-helper mx-1">—</span>
                                <span>Search AI Search instances</span>
                            </div>
                            <i
                                data-lucide="arrow-right"
                                class="w-4 h-4 text-icon-muted opacity-0 group-hover:opacity-100 transition-opacity"
                            ></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer / Shortcuts -->
            <div
                class="flex items-center gap-6 border-t border-border-subtle bg-surface-01 px-4 py-3 text-[12px] text-text-secondary"
            >
                <div class="flex items-center gap-1.5">
                    <div class="flex gap-1">
                        <kbd
                            class="flex items-center justify-center w-5 h-5 rounded border border-border-strong bg-surface-01 shadow-sm text-icon-secondary"
                        >
                            <i
                                data-lucide="chevron-up"
                                class="w-3 h-3 shrink-0"
                            ></i>
                        </kbd>
                        <kbd
                            class="flex items-center justify-center w-5 h-5 rounded border border-border-strong bg-surface-01 shadow-sm text-icon-secondary"
                        >
                            <i
                                data-lucide="chevron-down"
                                class="w-3 h-3 shrink-0"
                            ></i>
                        </kbd>
                    </div>
                    <span class="text-text-helper">to navigate</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <kbd
                        class="flex items-center justify-center w-5 h-5 rounded border border-border-strong bg-surface-01 shadow-sm text-icon-secondary"
                    >
                        <i
                            data-lucide="corner-down-left"
                            class="w-3 h-3 shrink-0"
                        ></i>
                    </kbd>
                    <span class="text-text-helper">to select</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let activeIndex = -1;

    function openSearch() {
        const modal = document.getElementById("search-modal");
        const input = document.getElementById("search-input");
        modal.classList.remove("hidden");
        input.value = "";
        input.focus();
        activeIndex = -1;
        document.body.style.overflow = "hidden";

        // Refresh Lucide icons if any were added dynamically
        if (window.lucide) window.lucide.createIcons();
    }

    function closeSearch() {
        const modal = document.getElementById("search-modal");
        modal.classList.add("hidden");
        document.body.style.overflow = "";
    }

    // Keyboard shortcuts
    window.addEventListener("keydown", (e) => {
        const modal = document.getElementById("search-modal");
        if (modal.classList.contains("hidden")) {
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
                e.preventDefault();
                openSearch();
            }
            return;
        }

        // Modal is open, handle navigation
        const results = document.querySelectorAll(
            "#search-results a, #search-results .cursor-default",
        );

        if (e.key === "ArrowDown") {
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, results.length - 1);
            updateSelection(results);
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, 0);
            updateSelection(results);
        } else if (e.key === "Enter" && activeIndex >= 0) {
            e.preventDefault();
            results[activeIndex].click();
        } else if (e.key === "Escape") {
            closeSearch();
        }
    });

    function updateSelection(results) {
        results.forEach((el, i) => {
            if (i === activeIndex) {
                el.classList.add("bg-surface-02");
                el.scrollIntoView({ block: "nearest" });
                // Show arrow icon if it exists
                const arrow = el.querySelector(".lucide-arrow-right");
                if (arrow) arrow.style.opacity = "1";
            } else {
                el.classList.remove("bg-surface-02");
                const arrow = el.querySelector(".lucide-arrow-right");
                if (arrow) arrow.style.opacity = "0";
            }
        });
    }

    // Reset index on new search
    document.addEventListener("htmx:afterOnLoad", (e) => {
        if (e.detail.target.id === "search-results") {
            activeIndex = -1;
            if (window.lucide) window.lucide.createIcons();
        }
    });
</script>
