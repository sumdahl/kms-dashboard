<aside id="sidebar"
    class="sidebar [grid-area:sidebar] h-full overflow-hidden bg-surface-01 border-r border-border-subtle flex flex-col"
    data-pinned="{{ sidebar_pinned }}">
    <!-- Zone A: hover triggers expand/collapse -->
    <div id="sidebar-hover-zone" class="sidebar-scroll flex-1 flex flex-col overflow-hidden overflow-y-auto">
        <!-- Account header -->
        <div
            class="flex items-center gap-3 px-3 h-12 min-h-12 border-b border-border-subtle overflow-hidden cursor-pointer hover:bg-surface-hover transition-colors">
            <!-- Logo placeholder -->
            <a href="/" class="sidebar-logo-wrapper h-6 shrink-0 overflow-hidden relative flex items-center justify-start">
                <img src="/static/logo/citytech_logo.webp" alt="Citytech Global Logo"
                    class="h-full w-auto object-left object-cover max-w-none origin-left scale-110" loading="lazy" />
            </a>
            <!-- Account info fades in when expanded -->
            <div class="sidebar-label flex items-center gap-2 min-w-0 flex-1">
                <span
                    class="text-[13px] font-medium text-text-primary overflow-hidden text-ellipsis whitespace-nowrap flex-1 min-w-0">{{
                    user_email }}
                </span>
                <i data-lucide="chevrons-up-down" class="text-icon-muted shrink-0 w-[14px] h-[14px]"></i>
            </div>
        </div>
        <!-- Search -->
        <div class="px-3 py-3 border-b border-border-subtle overflow-hidden shrink-0">
            <button
                onclick="openSearch()"
                class="sidebar-search-btn w-full flex items-center gap-2 h-8 px-2 border rounded-md hover:bg-surface-hover hover:border-text-primary transition-colors overflow-hidden group text-left">
                <i data-lucide="search" class="text-icon-secondary shrink-0 w-3.5 h-3.5"></i>
                <span class="sidebar-label text-[13px] font-medium text-text-secondary flex-1 truncate">Search...</span>
                <span
                    class="sidebar-label text-[10px] text-text-helper bg-surface-01 px-1.5 py-0.5 rounded border border-border-strong shrink-0 font-medium">⌘K</span>
            </button>
        </div>
        <!-- Nav -->
        <nav class="p-1 flex flex-col gap-0.5 flex-1 pb-8" aria-label="Main navigation">
            <a href="/?skip_onboarding=true"
                class="flex items-center gap-3 h-10 px-3 rounded-md text-text-primary font-semibold overflow-hidden"
                aria-current="page">
                <i data-lucide="home" class="w-[18px] h-[18px] min-w-[18px] text-icon-secondary shrink-0"></i>
                <span class="sidebar-label text-[14px] flex-1">Account home</span>
            </a>
            
            <!-- (Remaining nav items omitted for brevity but they should stay the same) -->
            <!-- Note: I will keep the nav items structure from the original file -->
            
            <details class="flex flex-col">
                <summary class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden">
                    <i data-lucide="clock" class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"></i>
                    <span class="sidebar-label text-[14px] flex-1">Recents</span>
                    <i data-lucide="chevron-right" class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"></i>
                </summary>
            </details>

            {% if is_admin %}
            <div>
                <div class="mt-2">
                    <div class="section-divider bg-border-subtle my-1"></div>
                    <span class="section-label flex items-end px-3 pb-1 text-[11px] text-text-helper whitespace-nowrap overflow-hidden">Admin</span>
                </div>
                <a href="/roles" class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors overflow-hidden">
                    <i data-lucide="shield-alert" class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"></i>
                    <span class="sidebar-label text-[14px] flex-1">Roles</span>
                </a>
                <a href="/users" class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors overflow-hidden">
                    <i data-lucide="users" class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"></i>
                    <span class="sidebar-label text-[14px] flex-1">Users</span>
                </a>
            </div>
            {% endif %}
        </nav>
    </div>
</aside>
