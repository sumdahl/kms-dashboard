<aside
  id="sidebar"
  class="sidebar [grid-area:sidebar] sticky top-0 h-[calc(100vh-40px)] overflow-hidden bg-surface-01 border-r border-border-subtle flex flex-col z-50"
  data-pinned="{{ sidebar_pinned }}"
>
  <!-- Zone A: hover triggers expand/collapse -->
  <div
    id="sidebar-hover-zone"
    class="sidebar-scroll flex-1 flex flex-col overflow-hidden overflow-y-auto"
  >
    <!-- Account header -->
    <div
      class="flex items-center gap-3 px-3 h-12 min-h-12 border-b border-border-subtle overflow-hidden cursor-pointer hover:bg-surface-hover transition-colors"
    >
      <!-- Logo placeholder -->
      <div
        class="w-6 h-6 min-w-6 rounded-sm border border-border-subtle bg-surface-02 shrink-0"
      ></div>
      <!-- Account info fades in when expanded -->
      <div class="sidebar-label flex items-center gap-2 min-w-0 flex-1">
        <span
          class="text-[13px] font-medium text-text-primary overflow-hidden text-ellipsis whitespace-nowrap flex-1 min-w-0"
          >{{ user_email }}</span
        >
        <!-- Lucide icon: chevrons-up-down -->
        <i
          data-lucide="chevrons-up-down"
          class="text-icon-muted shrink-0 w-[14px] h-[14px]"
        ></i>
      </div>
    </div>
    <!-- Search -->
    <div class="px-2 py-3 border-b border-border-subtle overflow-hidden">
      <div
        class="flex items-center gap-2 h-8 px-2 border border-border-subtle rounded-md bg-surface-02 cursor-text hover:border-border-strong transition-colors overflow-hidden"
      >
        <!-- Lucide icon: search -->
        <i
          data-lucide="search"
          class="text-icon-muted shrink-0 w-[14px] h-[14px]"
        ></i>
        <span class="sidebar-label text-[13px] text-text-placeholder flex-1"
          >Quick search...</span
        >
        <span class="sidebar-label text-[10px] text-text-helper">⌘K</span>
      </div>
    </div>
    <!-- Nav -->
    <nav class="p-2 flex flex-col gap-0.5 flex-1" aria-label="Main navigation">
      <!-- Account home (active) -->
      <a
        href="/"
        class="flex items-center gap-3 h-10 px-3 rounded-md text-text-primary font-semibold overflow-hidden"
        aria-current="page"
      >
        <!-- Lucide icon: home -->
        <i
          data-lucide="home"
          class="w-[18px] h-[18px] min-w-[18px] text-icon-secondary shrink-0"
        ></i>
        <span class="sidebar-label text-[14px] flex-1">Account home</span>
      </a>
      <!-- Recents -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: clock -->
          <i
            data-lucide="clock"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1">Recents</span>
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <div class="sidebar-label flex flex-col pb-1">
          <!-- sub-items have no icons -->
          <a
            href="#"
            class="flex flex-col justify-center min-h-[44px] px-3 pl-9 rounded-sm hover:bg-surface-hover transition-colors"
          >
            <span
              class="text-[13px] font-medium text-text-primary leading-tight"
              >Workers &amp; Pages</span
            >
            <span class="text-[11px] text-text-helper leading-tight"
              >Compute</span
            >
          </a>
          <!-- ... other recents items unchanged ... -->
        </div>
      </details>

      <!-- Analytics & logs -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: bar-chart-3 -->
          <i
            data-lucide="bar-chart-3"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1"
            >Analytics &amp; logs</span
          >
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- Domains -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: globe -->
          <i
            data-lucide="globe"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1">Domains</span>
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- ── Build section ──────────────────────────────────────────── -->
      <div class="mt-2">
        <div class="section-divider bg-border-subtle my-1"></div>
        <span
          class="section-label flex items-end px-3 pb-1 text-[11px] text-text-helper whitespace-nowrap overflow-hidden"
          >Build</span
        >
      </div>

      <!-- Compute -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: package -->
          <i
            data-lucide="package"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1">Compute</span>
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- AI -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: sparkles (perfect for AI section) -->
          <i
            data-lucide="sparkles"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1">AI</span>
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- Storage & databases -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: database -->
          <i
            data-lucide="database"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1"
            >Storage &amp; databases</span
          >
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- Media -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: play-circle -->
          <i
            data-lucide="play-circle"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1">Media</span>
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- ── Protect & Connect section ──────────────────────────────── -->
      <div class="mt-2">
        <div class="section-divider bg-border-subtle my-1"></div>
        <span
          class="section-label flex items-end px-3 pb-1 text-[11px] text-text-helper whitespace-nowrap overflow-hidden"
          >Protect &amp; Connect</span
        >
      </div>

      <!-- Application security -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: shield -->
          <i
            data-lucide="shield"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1"
            >Application security</span
          >
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- Zero Trust (direct link) -->
      <a
        href="#"
        class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors overflow-hidden"
      >
        <!-- Lucide icon: shield-check -->
        <i
          data-lucide="shield-check"
          class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
        ></i>
        <span class="sidebar-label text-[14px]">Zero Trust</span>
      </a>

      <!-- Networking -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: share-2 (best match for network topology) -->
          <i
            data-lucide="share-2"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1">Networking</span>
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- Delivery & performance -->
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: zap -->
          <i
            data-lucide="zap"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1"
            >Delivery &amp; performance</span
          >
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>

      <!-- Divider + Manage account -->
      <div class="h-px bg-border-subtle my-2 shrink-0"></div>
      <details class="flex flex-col">
        <summary
          class="flex items-center gap-3 h-10 px-3 rounded-md text-text-secondary hover:bg-surface-hover hover:text-text-primary transition-colors cursor-pointer overflow-hidden"
        >
          <!-- Lucide icon: settings -->
          <i
            data-lucide="settings"
            class="w-[18px] h-[18px] min-w-[18px] text-icon-muted shrink-0"
          ></i>
          <span class="sidebar-label text-[14px] flex-1">Manage account</span>
          <!-- Lucide icon: chevron-right -->
          <i
            data-lucide="chevron-right"
            class="sidebar-label chevron text-icon-muted shrink-0 w-[14px] h-[14px]"
          ></i>
        </summary>
        <!-- sub-items unchanged -->
      </details>
    </nav>
  </div>
  <!-- /sidebar-hover-zone -->
</aside>
