<script>
    (function () {
        try {
            const token = localStorage.getItem("kms_token");
            if (!token) return;
            const payload = JSON.parse(atob(token.split(".")[1]));

            // ── Populate user email in sidebar account header ──
            const emailEl = document.querySelector(
                "#sidebar .sidebar-label span.flex-1",
            );
            if (emailEl && payload.email) emailEl.textContent = payload.email;

            // ── Show Admin section if is_admin ──
            if (payload.is_admin) {
                const section = document.getElementById("admin-nav-section");
                if (section) {
                    section.classList.remove("hidden");
                    if (window.lucide) window.lucide.createIcons();
                }
            }
        } catch (e) { }
    })();
</script>
