<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset Password - KMS Dashboard</title>
        <link rel="stylesheet" href="/static/css/output.css" />
        <script src="/static/js/htmx.min.js" defer></script>
        <script
            src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"
            defer
        ></script>
        <script src="/static/js/lucide.umd.js"></script>
        <script src="/static/js/lucide-icons.js"></script>
    </head>
    <body class="bg-bg-page flex items-center justify-center min-h-screen px-4">
        <div class="w-full max-w-md">
            <!-- Brand -->
            <div
                class="flex items-center justify-center gap-2 mb-6"
                aria-hidden="true"
            >
                <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                <span
                    class="text-[11px] text-text-helper tracking-widest uppercase font-medium"
                    >KMS Dashboard</span
                >
            </div>

            <div
                class="bg-surface-01 border border-border-subtle rounded-card shadow-sm overflow-hidden"
            >
                <div
                    class="h-px bg-gradient-to-r from-transparent via-indigo-500/40 to-transparent"
                ></div>

                <div class="p-8">
                    <!-- Header -->
                    <div class="flex flex-col items-center mb-8">
                        <div
                            class="w-11 h-11 bg-surface-02 border border-border-subtle rounded-md flex items-center justify-center mb-5"
                            aria-hidden="true"
                        >
                            <i
                                data-lucide="shield"
                                class="w-5 h-5 text-icon-secondary shrink-0"
                            ></i>
                        </div>
                        <h1
                            class="text-xl font-semibold text-text-primary tracking-tight"
                        >
                            Set new password
                        </h1>
                        <p class="text-[13px] text-text-helper mt-1.5">
                            Must be at least 8 characters
                        </p>

                        <!-- Global error -->
                        <div
                            id="global-error"
                            role="alert"
                            aria-live="assertive"
                            aria-atomic="true"
                            class="hidden w-full max-w-[300px] mt-4"
                        >
                            <p
                                class="text-[11px] text-red-500 text-center bg-red-500/5 border border-red-500/20 rounded-sm px-3 py-2"
                            ></p>
                        </div>
                    </div>

                    <!-- Form -->
                    <div id="form-wrapper">
                        <form
                            id="reset-form"
                            hx-post="/auth/reset-password"
                            hx-ext="json-enc"
                            hx-swap="none"
                            novalidate
                            aria-label="Reset password form"
                            class="space-y-4"
                        >
                            <input
                                type="hidden"
                                name="token"
                                id="token-input"
                            />

                            <!-- New password -->
                            <div class="space-y-1.5">
                                <label
                                    for="new-password"
                                    class="block text-[11px] font-medium text-text-secondary tracking-wider uppercase"
                                >
                                    New password
                                    <span
                                        class="text-red-500 ml-0.5"
                                        aria-hidden="true"
                                        >*</span
                                    >
                                </label>
                                <div class="relative">
                                    <input
                                        type="password"
                                        name="new_password"
                                        id="new-password"
                                        autocomplete="new-password"
                                        placeholder="••••••••"
                                        aria-required="true"
                                        aria-describedby="pw-error password-strength-label"
                                        aria-invalid="false"
                                        class="w-full px-3 h-10 bg-surface-02 border border-border-subtle rounded-sm text-sm text-text-primary placeholder:text-text-helper focus:border-border-strong focus:outline-none transition-colors duration-150 pr-10"
                                    />
                                    <button
                                        type="button"
                                        id="toggle-new"
                                        aria-label="Show password"
                                        aria-pressed="false"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-icon-secondary hover:text-text-primary transition-colors focus:outline-none focus:text-text-primary"
                                    >
                                        <i
                                            id="eye-new"
                                            data-lucide="eye"
                                            class="w-4 h-4 shrink-0"
                                        ></i>
                                    </button>
                                </div>
                                <p
                                    id="pw-error"
                                    role="alert"
                                    aria-live="polite"
                                    class="hidden text-[11px] text-red-500 flex items-center gap-1 mt-1"
                                >
                                    <i
                                        data-lucide="circle-alert"
                                        class="w-[11px] h-[11px] shrink-0"
                                    ></i>
                                    <span id="pw-error-text"></span>
                                </p>
                            </div>

                            <!-- Password strength meter -->
                            <div
                                id="strength-meter"
                                class="hidden space-y-1"
                                aria-live="polite"
                            >
                                <div
                                    class="flex gap-1"
                                    role="progressbar"
                                    aria-valuemin="0"
                                    aria-valuemax="4"
                                    aria-valuenow="0"
                                    aria-label="Password strength"
                                    id="strength-bar"
                                >
                                    <div
                                        id="bar-1"
                                        class="h-1 flex-1 rounded-full bg-surface-02 transition-all duration-300"
                                    ></div>
                                    <div
                                        id="bar-2"
                                        class="h-1 flex-1 rounded-full bg-surface-02 transition-all duration-300"
                                    ></div>
                                    <div
                                        id="bar-3"
                                        class="h-1 flex-1 rounded-full bg-surface-02 transition-all duration-300"
                                    ></div>
                                    <div
                                        id="bar-4"
                                        class="h-1 flex-1 rounded-full bg-surface-02 transition-all duration-300"
                                    ></div>
                                </div>
                                <p
                                    id="password-strength-label"
                                    class="text-[11px] text-text-helper"
                                ></p>
                            </div>

                            <!-- Confirm password -->
                            <div class="space-y-1.5">
                                <label
                                    for="confirm-password"
                                    class="block text-[11px] font-medium text-text-secondary tracking-wider uppercase"
                                >
                                    Confirm password
                                    <span
                                        class="text-red-500 ml-0.5"
                                        aria-hidden="true"
                                        >*</span
                                    >
                                </label>
                                <div class="relative">
                                    <input
                                        type="password"
                                        name="confirm_password"
                                        id="confirm-password"
                                        autocomplete="new-password"
                                        placeholder="••••••••"
                                        aria-required="true"
                                        aria-describedby="confirm-error"
                                        aria-invalid="false"
                                        class="w-full px-3 h-10 bg-surface-02 border border-border-subtle rounded-sm text-sm text-text-primary placeholder:text-text-helper focus:border-border-strong focus:outline-none transition-colors duration-150 pr-10"
                                    />
                                    <button
                                        type="button"
                                        id="toggle-confirm"
                                        aria-label="Show confirm password"
                                        aria-pressed="false"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-icon-secondary hover:text-text-primary transition-colors focus:outline-none focus:text-text-primary"
                                    >
                                        <i
                                            id="eye-confirm"
                                            data-lucide="eye"
                                            class="w-4 h-4 shrink-0"
                                        ></i>
                                    </button>
                                </div>
                                <p
                                    id="confirm-error"
                                    role="alert"
                                    aria-live="polite"
                                    class="hidden text-[11px] text-red-500 flex items-center gap-1 mt-1"
                                >
                                    <i
                                        data-lucide="circle-alert"
                                        class="w-[11px] h-[11px] shrink-0"
                                    ></i>
                                    <span id="confirm-error-text"></span>
                                </p>
                            </div>

                            <!-- Submit -->
                            <button
                                type="submit"
                                id="submit-btn"
                                disabled
                                aria-disabled="true"
                                class="w-full h-9 bg-btn-primary text-white text-[13px] font-medium rounded-sm transition-all duration-150 mt-1 opacity-40 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-btn-primary"
                            >
                                Reset password
                            </button>
                        </form>
                    </div>

                    <!-- Success state -->
                    <div
                        id="success-state"
                        class="hidden flex flex-col items-center gap-3 py-2"
                        role="status"
                        aria-live="polite"
                        aria-atomic="true"
                    >
                        <div
                            class="w-10 h-10 rounded-full bg-green-500/10 border border-green-500/20 flex items-center justify-center"
                        >
                            <i
                                data-lucide="check"
                                class="w-[18px] h-[18px] text-green-500 shrink-0"
                            ></i>
                        </div>
                        <p
                            class="text-[13px] text-text-primary font-medium text-center"
                        >
                            Password updated
                        </p>
                        <p class="text-[12px] text-text-helper text-center">
                            Your password has been reset successfully.
                        </p>

                        <a
                            href="/login"
                            class="mt-2 w-full h-9 bg-btn-primary text-white text-[13px] font-medium rounded-sm hover:bg-btn-primary-hover transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-btn-primary"
                        >
                            Back to login
                        </a>
                    </div>

                    <!-- Invalid token state -->
                    <div
                        id="invalid-token-state"
                        class="hidden flex flex-col items-center gap-3 py-2"
                        role="alert"
                        aria-live="assertive"
                        aria-atomic="true"
                    >
                        <div
                            class="w-10 h-10 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center"
                        >
                            <i
                                data-lucide="circle-x"
                                class="w-[18px] h-[18px] text-red-500 shrink-0"
                            ></i>
                        </div>
                        <p
                            class="text-[13px] text-text-primary font-medium text-center"
                        >
                            Link invalid or expired
                        </p>
                        <p class="text-[12px] text-text-helper text-center">
                            This reset link has expired or already been used.
                        </p>
                        <a
                            href="/forgot-password"
                            class="mt-2 text-[12px] text-link-primary hover:underline font-medium focus:outline-none focus:underline"
                        >
                            Request a new link
                        </a>
                    </div>
                </div>

                <!-- Footer -->
                <div
                    class="px-8 py-4 bg-surface-02 border-t border-border-subtle flex items-center justify-center gap-1.5"
                >
                    <i
                        data-lucide="lock"
                        class="w-[11px] h-[11px] text-text-helper shrink-0"
                    ></i>
                    <span class="text-[11px] text-text-helper tracking-wide"
                        >End-to-end encrypted</span
                    >
                </div>
            </div>
        </div>

        <script>
            (function () {
                // ── Token guard (runs before anything else) ───────────────────
                const params = new URLSearchParams(window.location.search);
                const token = params.get("token");
                const formWrapper = document.getElementById("form-wrapper");
                const invalidState = document.getElementById(
                    "invalid-token-state",
                );
                const successState = document.getElementById("success-state");

                if (token) {
                    document.getElementById("token-input").value = token;
                } else {
                    formWrapper.classList.add("hidden");
                    invalidState.classList.remove("hidden");
                    if (window.lucide) window.lucide.createIcons();
                    return; // nothing left to wire up
                }

                // ── Element refs ──────────────────────────────────────────────
                const form = document.getElementById("reset-form");
                const pwInput = document.getElementById("new-password");
                const confirmInput =
                    document.getElementById("confirm-password");
                const pwErr = document.getElementById("pw-error");
                const pwErrTxt = document.getElementById("pw-error-text");
                const confirmErr = document.getElementById("confirm-error");
                const confirmErrTxt =
                    document.getElementById("confirm-error-text");
                const globalErrEl = document.getElementById("global-error");
                const globalErrP = globalErrEl.querySelector("p");
                const submitBtn = document.getElementById("submit-btn");
                const strengthMeter = document.getElementById("strength-meter");
                const strengthLabel = document.getElementById(
                    "password-strength-label",
                );
                const strengthBar = document.getElementById("strength-bar");
                const bars = [1, 2, 3, 4].map((i) =>
                    document.getElementById(`bar-${i}`),
                );

                // ── State ─────────────────────────────────────────────────────
                let isSubmitting = false;
                let pwDirty = false;
                let confirmDirty = false;

                // ── Validation rules ──────────────────────────────────────────
                function validatePassword(val) {
                    if (!val) return "Password is required.";
                    if (val.length < 8)
                        return `At least 8 characters (${val.length}/8).`;
                    return "";
                }

                function validateConfirm(pw, confirm) {
                    if (!confirm) return "Please confirm your password.";
                    if (pw !== confirm) return "Passwords do not match.";
                    return "";
                }

                // ── Password strength ─────────────────────────────────────────
                const STRENGTH = [
                    {
                        label: "Very weak",
                        color: "bg-red-500",
                        text: "text-red-500",
                    },
                    {
                        label: "Weak",
                        color: "bg-orange-400",
                        text: "text-orange-400",
                    },
                    {
                        label: "Fair",
                        color: "bg-yellow-400",
                        text: "text-yellow-500",
                    },
                    {
                        label: "Strong",
                        color: "bg-green-500",
                        text: "text-green-500",
                    },
                ];

                function getStrengthScore(val) {
                    let score = 0;
                    if (val.length >= 8) score++;
                    if (val.length >= 12) score++;
                    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
                    if (/[0-9]/.test(val)) score++;
                    if (/[^A-Za-z0-9]/.test(val)) score++;
                    return Math.min(Math.max(score - 1, 0), 3);
                }

                function updateStrengthMeter(val) {
                    if (!val) {
                        strengthMeter.classList.add("hidden");
                        bars.forEach(
                            (b) =>
                                (b.className =
                                    "h-1 flex-1 rounded-full bg-surface-02 transition-all duration-300"),
                        );
                        return;
                    }
                    strengthMeter.classList.remove("hidden");
                    const score = getStrengthScore(val);
                    const filled = score + 1;
                    const s = STRENGTH[score];

                    bars.forEach((b, i) => {
                        b.className = `h-1 flex-1 rounded-full transition-all duration-300 ${i < filled ? s.color : "bg-surface-02"}`;
                    });

                    strengthLabel.textContent = s.label;
                    strengthLabel.className = `text-[11px] font-medium ${s.text}`;
                    strengthBar.setAttribute("aria-valuenow", filled);
                    strengthBar.setAttribute(
                        "aria-label",
                        `Password strength: ${s.label}`,
                    );
                }

                // ── Border helpers ────────────────────────────────────────────
                const BORDER = {
                    default: ["border-border-subtle"],
                    error: ["border-red-500"],
                    ok: ["border-green-500"],
                };

                function setBorder(el, state) {
                    Object.values(BORDER).forEach((cls) =>
                        el.classList.remove(...cls),
                    );
                    el.classList.add(...BORDER[state]);
                }

                // ── Field error display ───────────────────────────────────────
                function showFieldError(errEl, txtEl, input, msg) {
                    txtEl.textContent = msg;
                    errEl.classList.remove("hidden");
                    input.setAttribute("aria-invalid", "true");
                    setBorder(input, "error");
                }

                function clearFieldError(errEl, txtEl, input) {
                    txtEl.textContent = "";
                    errEl.classList.add("hidden");
                    input.setAttribute("aria-invalid", "false");
                }

                // ── Global error ──────────────────────────────────────────────
                function showGlobalError(msg) {
                    globalErrP.textContent = msg;
                    globalErrEl.classList.remove("hidden");
                    globalErrEl.scrollIntoView({
                        behavior: "smooth",
                        block: "nearest",
                    });
                }

                function clearGlobalError() {
                    globalErrEl.classList.add("hidden");
                    globalErrP.textContent = "";
                }

                // ── Submit button state ───────────────────────────────────────
                function updateSubmitState() {
                    const canSubmit =
                        validatePassword(pwInput.value) === "" &&
                        validateConfirm(pwInput.value, confirmInput.value) ===
                            "" &&
                        !isSubmitting;

                    submitBtn.disabled = !canSubmit;
                    submitBtn.setAttribute("aria-disabled", String(!canSubmit));

                    if (canSubmit) {
                        submitBtn.classList.remove(
                            "opacity-40",
                            "cursor-not-allowed",
                        );
                        submitBtn.classList.add(
                            "hover:bg-btn-primary-hover",
                            "cursor-pointer",
                        );
                    } else {
                        submitBtn.classList.add(
                            "opacity-40",
                            "cursor-not-allowed",
                        );
                        submitBtn.classList.remove(
                            "hover:bg-btn-primary-hover",
                            "cursor-pointer",
                        );
                    }
                }

                // ── Loading state ─────────────────────────────────────────────
                function setLoading(loading) {
                    isSubmitting = loading;
                    submitBtn.disabled = loading;
                    submitBtn.setAttribute("aria-disabled", String(loading));

                    if (loading) {
                        submitBtn.innerHTML = `
                        <span class="flex items-center justify-center gap-2">
                            <svg class="animate-spin w-3.5 h-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            Updating…
                        </span>`;
                        submitBtn.classList.add(
                            "opacity-70",
                            "cursor-not-allowed",
                        );
                        submitBtn.classList.remove(
                            "hover:bg-btn-primary-hover",
                        );
                    } else {
                        submitBtn.textContent = "Reset password";
                        submitBtn.classList.remove(
                            "opacity-70",
                            "cursor-not-allowed",
                        );
                        updateSubmitState();
                    }
                }

                // ── Field handlers ────────────────────────────────────────────
                function handlePasswordValidation() {
                    const val = pwInput.value;
                    const err = validatePassword(val);
                    updateStrengthMeter(val);

                    if (!val) {
                        setBorder(pwInput, "default");
                        clearFieldError(pwErr, pwErrTxt, pwInput);
                    } else if (err) {
                        showFieldError(pwErr, pwErrTxt, pwInput, err);
                    } else {
                        clearFieldError(pwErr, pwErrTxt, pwInput);
                        setBorder(pwInput, "ok");
                    }

                    // Re-validate confirm live if already touched
                    if (confirmDirty && confirmInput.value) {
                        handleConfirmValidation();
                    }

                    updateSubmitState();
                }

                function handleConfirmValidation() {
                    const val = confirmInput.value;
                    const err = validateConfirm(pwInput.value, val);

                    if (!val) {
                        setBorder(confirmInput, "default");
                        clearFieldError(
                            confirmErr,
                            confirmErrTxt,
                            confirmInput,
                        );
                    } else if (err) {
                        showFieldError(
                            confirmErr,
                            confirmErrTxt,
                            confirmInput,
                            err,
                        );
                    } else {
                        clearFieldError(
                            confirmErr,
                            confirmErrTxt,
                            confirmInput,
                        );
                        setBorder(confirmInput, "ok");
                    }

                    updateSubmitState();
                }

                // ── Event listeners ───────────────────────────────────────────
                pwInput.addEventListener("input", () => {
                    pwDirty = true;
                    handlePasswordValidation();
                    clearGlobalError();
                });

                pwInput.addEventListener("blur", () => {
                    if (pwDirty) handlePasswordValidation();
                });

                confirmInput.addEventListener("input", () => {
                    confirmDirty = true;
                    handleConfirmValidation();
                    clearGlobalError();
                });

                confirmInput.addEventListener("blur", () => {
                    if (confirmDirty) handleConfirmValidation();
                });

                // ── Password visibility toggles ───────────────────────────────
                function makeToggle(
                    btnId,
                    inputEl,
                    iconId,
                    labelShow,
                    labelHide,
                ) {
                    let visible = false;
                    const btn = document.getElementById(btnId);
                    btn.addEventListener("click", () => {
                        visible = !visible;
                        inputEl.type = visible ? "text" : "password";
                        document
                            .getElementById(iconId)
                            .setAttribute(
                                "data-lucide",
                                visible ? "eye-off" : "eye",
                            );
                        btn.setAttribute(
                            "aria-label",
                            visible ? labelHide : labelShow,
                        );
                        btn.setAttribute("aria-pressed", String(visible));
                        if (window.lucide) window.lucide.createIcons();
                        inputEl.focus();
                    });
                }

                makeToggle(
                    "toggle-new",
                    pwInput,
                    "eye-new",
                    "Show password",
                    "Hide password",
                );
                makeToggle(
                    "toggle-confirm",
                    confirmInput,
                    "eye-confirm",
                    "Show confirm password",
                    "Hide confirm password",
                );

                // ── HTMX: block if invalid, set loading ───────────────────────
                form.addEventListener("htmx:beforeRequest", (evt) => {
                    clearGlobalError();

                    const pErr = validatePassword(pwInput.value);
                    const cErr = validateConfirm(
                        pwInput.value,
                        confirmInput.value,
                    );

                    if (pErr) showFieldError(pwErr, pwErrTxt, pwInput, pErr);
                    if (cErr)
                        showFieldError(
                            confirmErr,
                            confirmErrTxt,
                            confirmInput,
                            cErr,
                        );

                    if (pErr || cErr || isSubmitting) {
                        evt.preventDefault();
                        return;
                    }

                    setLoading(true);
                });

                // ── HTMX: handle response ─────────────────────────────────────
                document.body.addEventListener("htmx:afterRequest", (evt) => {
                    if (evt.detail.elt.id !== "reset-form") return;

                    setLoading(false);
                    const xhr = evt.detail.xhr;

                    if (xhr.status >= 200 && xhr.status < 300) {
                        formWrapper.classList.add("hidden");
                        successState.classList.remove("hidden");
                        if (window.lucide) window.lucide.createIcons();
                        return;
                    }

                    // Token expired / invalid — surface the dedicated state
                    if (xhr.status === 400) {
                        try {
                            const res = JSON.parse(xhr.responseText);
                            const msg = (
                                res.error ||
                                res.message ||
                                res.detail ||
                                ""
                            ).toLowerCase();
                            if (
                                msg.includes("expired") ||
                                msg.includes("invalid") ||
                                msg.includes("used")
                            ) {
                                formWrapper.classList.add("hidden");
                                invalidState.classList.remove("hidden");
                                if (window.lucide) window.lucide.createIcons();
                                return;
                            }
                        } catch {}
                    }

                    let msg = "Something went wrong. Please try again.";
                    try {
                        const res = JSON.parse(xhr.responseText);
                        msg =
                            res.error ||
                            res.message ||
                            res.detail ||
                            (xhr.status === 429
                                ? "Too many attempts. Try again later."
                                : xhr.status === 0
                                  ? "Connection error. Check your network."
                                  : msg);
                    } catch {
                        if (xhr.status === 0)
                            msg = "Connection error. Check your network.";
                    }

                    showGlobalError(msg);

                    const card = form.closest(".bg-surface-01");
                    if (card) {
                        card.classList.add("animate-shake");
                        setTimeout(
                            () => card.classList.remove("animate-shake"),
                            500,
                        );
                    }
                });

                // ── Init ──────────────────────────────────────────────────────
                updateSubmitState();
            })();
        </script>

        <style>
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                15% {
                    transform: translateX(-5px);
                }
                30% {
                    transform: translateX(5px);
                }
                45% {
                    transform: translateX(-4px);
                }
                60% {
                    transform: translateX(4px);
                }
                75% {
                    transform: translateX(-2px);
                }
                90% {
                    transform: translateX(2px);
                }
            }
            .animate-shake {
                animation: shake 0.45s ease-in-out;
            }
        </style>
    </body>
</html>
